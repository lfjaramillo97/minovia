<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para Mi Universo 🌌</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;500&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #000; 
            overflow: hidden; 
            font-family: 'Dancing Script', cursive; 
            color: white; 
            width: 100vw; 
            height: 100vh;
            position: fixed;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        /* PLANETA */
        #planet-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            -webkit-transform: translate(-50%, -50%) scale(0);
            width: 220px; height: 220px;
            display: none;
            z-index: 10;
        }

        #planet {
            width: 100%; height: 100%;
            border-radius: 50%;
            position: relative;
            overflow: visible;
        }
        #planet-canvas {
            border-radius: 50%;
            display: block;
        }
        /* Anillos del planeta */
        .planet-ring {
            position: absolute;
            top: 50%; left: 50%;
            border-radius: 50%;
            border: 3px solid rgba(255, 200, 255, 0.35);
            transform: translate(-50%, -50%) rotateX(72deg);
            pointer-events: none;
        }

        /* CUBO 3D AJUSTADO */
        .scene {
            width: 100%;
            height: 350px;
            perspective: 1000px;
            -webkit-perspective: 1000px;
            display: none;
            z-index: 50;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
        }
        .cube-wrapper { width: 150px; height: 150px; transform-style: preserve-3d; -webkit-transform-style: preserve-3d; }
        .cube {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
            transform: rotateX(-15deg) rotateY(-15deg);
        }
        .cube-face {
            position: absolute;
            width: 150px; height: 150px;
            border: 1px solid rgba(255,255,255,0.4);
            background: #111;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        .cube-face img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        .front  { transform: rotateY(  0deg) translateZ(75px); -webkit-transform: rotateY(  0deg) translateZ(75px); }
        .back   { transform: rotateY(180deg) translateZ(75px); -webkit-transform: rotateY(180deg) translateZ(75px); }
        .right  { transform: rotateY( 90deg) translateZ(75px); -webkit-transform: rotateY( 90deg) translateZ(75px); }
        .left   { transform: rotateY(-90deg) translateZ(75px); -webkit-transform: rotateY(-90deg) translateZ(75px); }
        .top    { transform: rotateX( 90deg) translateZ(75px); -webkit-transform: rotateX( 90deg) translateZ(75px); }
        .bottom { transform: rotateX(-90deg) translateZ(75px); -webkit-transform: rotateX(-90deg) translateZ(75px); }

        /* UI */
        #start-screen {
            position: absolute; width: 100%; height: 100%;
            background: #000; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn {
            padding: 15px 40px; background: #00f2fe; border: none;
            border-radius: 50px; color: #000; font-size: 1.3rem;
            font-family: 'Montserrat', sans-serif; font-weight: bold;
            z-index: 110; pointer-events: auto; box-shadow: 0 0 20px rgba(0,242,254,0.5);
            cursor: pointer;
        }
        #progress-bar { 
            position: fixed; bottom: 40px; width: 0%; height: 4px; 
            background: #00f2fe; z-index: 20; left: 20%; right: 20%; 
        }

        /* PALABRAS - nueva implementación con CSS */
        .warp-word {
            position: fixed;
            pointer-events: none;
            z-index: 5;
            font-family: 'Dancing Script', cursive;
            font-weight: bold;
            white-space: nowrap;
            text-shadow: 0 0 8px rgba(0,0,0,0.9), 0 0 20px currentColor;
            will-change: transform, opacity;
            transform-origin: center center;
        }

        #proposal-screen { 
            display: none; text-align: center; z-index: 100; padding: 30px; 
            background: rgba(0,0,0,0.7); border-radius: 20px; max-width: 90%;
        }
        .letter { font-size: 1.4rem; line-height: 1.6; margin-bottom: 20px; font-family: 'Dancing Script', cursive; }
        .btn-no { background: none; border: 1px solid white; color: white; position: absolute; transition: 0.1s; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="margin-bottom: 25px; font-size: 2.2rem; text-align: center;">Nuestro Viaje Juntos</h1>
        <button class="btn" id="btn-start">Empezar Viaje 🚀</button>
    </div>

    <canvas id="canvas"></canvas>

    <div id="planet-container">
        <div id="planet">
            <canvas id="planet-canvas" width="220" height="220"></canvas>
            <div class="planet-ring" style="width:300px;height:300px;border-width:4px;border-color:rgba(255,180,255,0.3);"></div>
            <div class="planet-ring" style="width:345px;height:345px;border-width:2px;border-color:rgba(180,220,255,0.18);"></div>
        </div>
        <p style="text-align: center; margin-top: 25px; font-size: 1.2rem;">Llegamos al destino 💙</p>
    </div>

    <div id="ui-container" style="position: absolute; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; pointer-events: none;">
        <div class="scene" id="cube-scene" style="pointer-events: auto;">
            <div class="cube-wrapper">
                <div class="cube" id="cube">
                    <div class="cube-face front"><img src="https://raw.githubusercontent.com/lfjaramillo97/minovia/main/imagen1.jpeg"></div>
                    <div class="cube-face back"><img src="https://raw.githubusercontent.com/lfjaramillo97/minovia/main/imagen2.jpeg"></div>
                    <div class="cube-face right"><img src="https://raw.githubusercontent.com/lfjaramillo97/minovia/main/imagen3.jpeg"></div>
                    <div class="cube-face left"><img src="https://raw.githubusercontent.com/lfjaramillo97/minovia/main/imagen4.jpeg"></div>
                    <div class="cube-face top"><img src="https://raw.githubusercontent.com/lfjaramillo97/minovia/main/imagen5.jpeg"></div>
                    <div class="cube-face bottom"><img src="https://raw.githubusercontent.com/lfjaramillo97/minovia/main/imagen6.jpeg"></div>
                </div>
            </div>
            <button class="btn" onclick="showProposal()">Siguiente paso 💙</button>
        </div>

        <div id="proposal-screen" style="pointer-events: auto;">
            <p class="letter">"Quiero que sepas que cada momento que hemos compartido ha hecho que te quiera más. El tiempo a tu lado se ha vuelto algo muy especial para mí, y cada día confirmo lo mucho que me importas."</p>
            <h2 style="font-size: 2.2rem; margin-bottom: 30px;">Entonces… ¿quieres ser mi novia?</h2>
            <div style="height: 100px; position: relative; width: 100%;">
                <button class="btn" onclick="alert('¡TE AMO INFINITO! ❤️ Eres lo mejor de mi vida.')">¡SÍ! 😍</button>
                <button id="no-btn" class="btn btn-no" onclick="moveNo()" ontouchstart="moveNo()">No</button>
            </div>
        </div>
    </div>

    <div id="progress-bar"></div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const words = [
        "1500 besitos", "Mi linda", "Mi amor", "Mi vida",
        "Mi hermosa", "Me fascinas", "Me encantas", "Mi bebé",
        "Te extraño", "Eres perfecta", "Te adoro",
        "Mi cielo", "Mi sol", "Mi reina", "Eres especial",
        "Contigo todo", "Tu sonrisa", "Mis ganas de verte",
        "Mi corazón", "Lo mejor de mi día", "Pienso en ti",
        "Eres mágica", "Me haces feliz", "Mi tesoro",
        "Te quiero tanto", "Eres mi todo", "Mi alegría",
        "Mi favorita", "Sin ti no puedo", "Infinitamente",
        "Mi luz", "Eres única", "Me late el corazón",
        "Por siempre", "Mi mundo", "Te necesito",
        "Eres lo mejor", "Me encantas tanto", "Eres mi paz",
        "Contigo soy feliz", "Eres mi sueño", "Te pienso siempre",
        "Quiero tu risa", "Eres mi calma", "Mi lugar favorito",
        "Me robaste el corazón", "Eres mi aventura", "Mi persona favorita",
        "Eres radiante", "Siempre tú", "Mi razón de sonreír",
        "Cuánto te quiero", "Eres todo para mí", "Mi universo eres tú"
    ];

    // Colores románticos para las palabras
    const wordColors = [
        '#ff6eb4', '#ff9de2', '#c084fc', '#a78bfa',
        '#60a5fa', '#34d399', '#fb7185', '#f9a8d4',
        '#fcd34d', '#6ee7b7', '#93c5fd', '#f0abfc',
        '#ff80ab', '#ea80fc', '#82b1ff', '#80d8ff'
    ];

    let width, height, stars = [], wordMeteors = [], active = false, progress = 0;
    let wordInterval = null;

    function init() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        stars = [];
        wordMeteors = [];
        for (let i = 0; i < 300; i++) {
            stars.push({ x: Math.random() * width - width / 2, y: Math.random() * height - height / 2, z: Math.random() * width });
        }
        // Pre-poblar meteoros de palabras distribuidos aleatoriamente en el espacio
        for (let i = 0; i < 80; i++) {
            wordMeteors.push(createWordMeteor(true));
        }
    }

    function createWordMeteor(randomZ) {
        const angle = Math.random() * Math.PI * 2;
        // spread amplio — toda la pantalla, no solo bordes
        const spread = 0.9;
        return {
            text: words[Math.floor(Math.random() * words.length)],
            color: wordColors[Math.floor(Math.random() * wordColors.length)],
            x: (Math.random() - 0.5) * width * spread,
            y: (Math.random() - 0.5) * height * spread,
            z: randomZ ? Math.random() * width : width,         // si randomZ, distribuir a lo largo del eje Z
            fontSize: Math.random() * 10 + 10,                  // 10-20px base
            speed: Math.random() * 4 + 3,                        // velocidad propia extra
        };
    }

    function drawWordMeteors() {
        if (!active) return;
        ctx.save();
        wordMeteors.forEach((m, i) => {
            // Avanzar el meteoro (acercarse = z decrece)
            m.z -= active ? (m.speed + 4) : 0;
            if (m.z <= 0) {
                // Reciclar con nueva palabra desde lejos
                wordMeteors[i] = createWordMeteor(false);
                return;
            }

            // Proyección perspectiva
            const scale = width / m.z;
            const sx = m.x * scale + width / 2;
            const sy = m.y * scale + height / 2;

            // Solo dibujar si está en pantalla (con margen)
            if (sx < -200 || sx > width + 200 || sy < -80 || sy > height + 80) return;

            const fontSize = m.fontSize * scale;
            if (fontSize < 4) return; // muy pequeño, no dibujar

            const alpha = Math.min(1, Math.max(0, (1 - m.z / width) * 2)); // fade conforme se acerca
            const trailAlpha = alpha * 0.25;

            // Estela de la palabra (trail)
            const prevScale = width / (m.z + m.speed * 6);
            const prevSx = m.x * prevScale + width / 2;
            const prevSy = m.y * prevScale + height / 2;
            const prevFont = m.fontSize * prevScale;

            ctx.globalAlpha = trailAlpha;
            ctx.font = `bold ${prevFont}px 'Dancing Script', cursive`;
            ctx.fillStyle = m.color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(m.text, prevSx, prevSy);

            // Palabra principal
            ctx.globalAlpha = alpha;
            ctx.font = `bold ${fontSize}px 'Dancing Script', cursive`;
            ctx.shadowColor = m.color;
            ctx.shadowBlur = 8;
            ctx.fillStyle = m.color;
            ctx.fillText(m.text, sx, sy);
            ctx.shadowBlur = 0;
        });
        ctx.globalAlpha = 1;
        ctx.restore();
    }

    function startWordSpawner() {
        // Inyectar nuevos meteoros continuamente para mantener densidad alta
        function scheduleNext() {
            if (!active || progress >= 100) return;
            const delay = Math.random() * 80 + 40; // cada 40-120ms lanzar uno nuevo
            wordInterval = setTimeout(() => {
                if (wordMeteors.length < 120) {
                    wordMeteors.push(createWordMeteor(false));
                }
                scheduleNext();
            }, delay);
        }
        scheduleNext();
    }

    function animate() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, width, height);

        stars.forEach(s => {
            s.z -= (active ? 6 : 0.4);
            if (s.z <= 0) s.z = width;
            const x = (s.x / s.z) * width + width / 2;
            const y = (s.y / s.z) * height + height / 2;
            const size = (1 - s.z / width) * 3;
            ctx.fillStyle = `rgba(255,255,255,${1 - s.z / width})`;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();
        });

        // Dibujar palabras-meteoro en el canvas
        drawWordMeteors();

        if (active && progress < 100) {
            progress += 0.12;
            document.getElementById('progress-bar').style.width = progress * 0.6 + '%';
            document.getElementById('planet-container').style.display = 'block';
            document.getElementById('planet-container').style.transform = `translate(-50%, -50%) scale(${progress / 45})`;
            document.getElementById('planet-container').style.webkitTransform = `translate(-50%, -50%) scale(${progress / 45})`;
        }

        requestAnimationFrame(animate);
    }

    // ---- PLANETA BONITO ----
    function drawPlanet() {
        const pc = document.getElementById('planet-canvas');
        const cx = pc.getContext('2d');
        const R = 110; // radio
        const cx0 = 110, cy0 = 110;

        // Fondo base: gradiente azul-violeta
        const base = cx.createRadialGradient(80, 75, 10, cx0, cy0, R);
        base.addColorStop(0, '#a78bfa');
        base.addColorStop(0.3, '#6366f1');
        base.addColorStop(0.65, '#1d4ed8');
        base.addColorStop(1, '#0f172a');
        cx.beginPath();
        cx.arc(cx0, cy0, R, 0, Math.PI * 2);
        cx.fillStyle = base;
        cx.fill();

        // Manchas de océano / continentes — capas de color
        const continents = [
            { x: 75, y: 80, rx: 38, ry: 22, color: 'rgba(52,211,153,0.55)', rot: -0.3 },
            { x: 130, y: 110, rx: 28, ry: 18, color: 'rgba(52,211,153,0.4)', rot: 0.5 },
            { x: 60, y: 130, rx: 20, ry: 14, color: 'rgba(74,222,128,0.35)', rot: 0.8 },
            { x: 145, y: 65, rx: 18, ry: 12, color: 'rgba(34,197,94,0.3)', rot: -0.6 },
            { x: 95, y: 155, rx: 25, ry: 13, color: 'rgba(52,211,153,0.3)', rot: 0.2 },
        ];

        cx.save();
        cx.beginPath();
        cx.arc(cx0, cy0, R, 0, Math.PI * 2);
        cx.clip();

        continents.forEach(c => {
            cx.save();
            cx.translate(c.x, c.y);
            cx.rotate(c.rot);
            cx.beginPath();
            cx.ellipse(0, 0, c.rx, c.ry, 0, 0, Math.PI * 2);
            cx.fillStyle = c.color;
            cx.fill();
            cx.restore();
        });

        // Nubes / velos atmosféricos
        const clouds = [
            { x: 90, y: 60, rx: 55, ry: 12, color: 'rgba(255,255,255,0.12)' },
            { x: 110, y: 100, rx: 65, ry: 10, color: 'rgba(255,255,255,0.08)' },
            { x: 80, y: 140, rx: 50, ry: 9, color: 'rgba(255,255,255,0.1)' },
            { x: 120, y: 175, rx: 40, ry: 8, color: 'rgba(255,255,255,0.07)' },
        ];
        clouds.forEach(c => {
            cx.save();
            cx.translate(c.x, c.y);
            cx.beginPath();
            cx.ellipse(0, 0, c.rx, c.ry, -0.15, 0, Math.PI * 2);
            cx.fillStyle = c.color;
            cx.fill();
            cx.restore();
        });

        cx.restore();

        // Brillo especular (luz superior izquierda)
        const shine = cx.createRadialGradient(75, 70, 2, 75, 70, 80);
        shine.addColorStop(0, 'rgba(255,255,255,0.32)');
        shine.addColorStop(0.4, 'rgba(255,255,255,0.08)');
        shine.addColorStop(1, 'rgba(255,255,255,0)');
        cx.save();
        cx.beginPath();
        cx.arc(cx0, cy0, R, 0, Math.PI * 2);
        cx.clip();
        cx.fillStyle = shine;
        cx.fillRect(0, 0, 220, 220);
        cx.restore();

        // Sombra interior (lado oscuro)
        const shadow = cx.createRadialGradient(155, 155, 30, 175, 170, R * 1.1);
        shadow.addColorStop(0, 'rgba(0,0,0,0)');
        shadow.addColorStop(0.6, 'rgba(0,0,10,0.25)');
        shadow.addColorStop(1, 'rgba(0,0,0,0.75)');
        cx.save();
        cx.beginPath();
        cx.arc(cx0, cy0, R, 0, Math.PI * 2);
        cx.clip();
        cx.fillStyle = shadow;
        cx.fillRect(0, 0, 220, 220);
        cx.restore();

        // Atmósfera exterior (halo)
        const atmo = cx.createRadialGradient(cx0, cy0, R - 8, cx0, cy0, R + 18);
        atmo.addColorStop(0, 'rgba(139,92,246,0.5)');
        atmo.addColorStop(0.5, 'rgba(99,102,241,0.25)');
        atmo.addColorStop(1, 'rgba(0,0,0,0)');
        cx.beginPath();
        cx.arc(cx0, cy0, R + 18, 0, Math.PI * 2);
        cx.fillStyle = atmo;
        cx.fill();
    }

    // ---- FIN PLANETA ----

    document.getElementById('btn-start').addEventListener('click', function() {
        active = true;
        document.getElementById('start-screen').style.display = 'none';
        init();
        drawPlanet();
        startWordSpawner();
    });

    document.getElementById('planet-container').addEventListener('click', function() {
        if (progress >= 85) {
            this.style.display = 'none';
            document.getElementById('progress-bar').style.display = 'none';
            document.getElementById('cube-scene').style.display = 'flex';
            // Detener palabras
            active = false;
            if (wordInterval) clearTimeout(wordInterval);
        }
    });

    function showProposal() {
        document.getElementById('cube-scene').style.display = 'none';
        document.getElementById('proposal-screen').style.display = 'block';
    }

    function moveNo() {
        const btn = document.getElementById('no-btn');
        btn.style.left = Math.random() * 70 + '%';
        btn.style.top = Math.random() * 70 + '%';
    }

    let cube = document.getElementById('cube'), isDrag = false, lX, lY, rX = -15, rY = -15;
    const sDrag = (x, y) => { isDrag = true; lX = x; lY = y; };
    const mDrag = (x, y) => {
        if (!isDrag) return;
        rY += (x - lX) * 0.6;
        rX -= (y - lY) * 0.6;
        cube.style.transform = `rotateX(${rX}deg) rotateY(${rY}deg)`;
        lX = x; lY = y;
    };
    window.addEventListener('mousedown', e => sDrag(e.clientX, e.clientY));
    window.addEventListener('touchstart', e => sDrag(e.touches[0].clientX, e.touches[0].clientY));
    window.addEventListener('mousemove', e => mDrag(e.clientX, e.clientY));
    window.addEventListener('touchmove', e => mDrag(e.touches[0].clientX, e.touches[0].clientY));
    window.addEventListener('mouseup', () => isDrag = false);
    window.addEventListener('touchend', () => isDrag = false);

    init();
    animate();
</script>
</body>
</html>
